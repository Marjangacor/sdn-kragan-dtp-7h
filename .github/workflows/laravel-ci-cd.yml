name: Laravel CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest   # tidak perlu services: mysql!

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_sqlite   # extension SQLite

      - name: Install Composer
        run: composer install --no-interaction

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Create SQLite database
        run: touch database/database.sqlite   # buat file database

      - name: Run migrations
        run: php artisan migrate
        env:
          DB_CONNECTION: sqlite               # pakai SQLite
          DB_DATABASE: database/database.sqlite

      - name: Install NPM dependencies
        run: npm ci

      - name: Build Vite assets
        run: npm run build
      
      - name: Run tests
        run: php artisan test
        env:
          DB_CONNECTION: sqlite               # pakai SQLite
          DB_DATABASE: database/database.sqlite